body:
  text: 麻姑傳漢孝桓帝時神仙王遠字方平降於蔡經家將至一時頃聞金鼓簫管人馬之聲及舉家皆見王方平戴遠遊冠著朱衣虎頭鞶囊五色之綬帶劍少鬚黃色中形人也乘羽車駕五龍龍各異色麾節幡旗前後導後威儀奕奕如大將軍鼓吹皆乘麟從天而下懸隻於庭從官皆長丈餘不從道行既至從官皆隱不知所在唯見方平與經父母兄弟相見獨坐久之即令人相訪經家亦不知麻姑何人也言曰王方平敬報姑余久不在人間今集在此想姑能暫來語乎有頃使者還不見其使但聞其語云麻姑再拜不見忽已五百餘年尊畢有敘修敬無階煩信來承在彼登山顛倒而先受命當按行蓬萊今便暫往如是當還還便親覲願來即去如此兩時間麻姑至矣來時亦先聞人馬簫鼓聲既至從官半於方平麻姑至蔡經亦舉家見之是好女子年十八九許於頂中作髻餘髮垂至腰其衣有文章而非錦綺綵耀目不可名狀入拜方平方平為之起立坐定召進行廚皆金盤玉杯肴膳多是諸花果而香氣達於內外擘脯行之如柏靈云是麟脯也麻姑是說云接侍以來已見東海三為桑田向到蓬萊水又淺于往者會時略半也豈將復還為陵陸乎方平笑曰聖人皆言海中復揚塵也姑欲見蔡經母及婦姪時弟婦新産數十日麻姑望見乃知之曰噫且止勿前即求少許米得米便撒之擲地視其米皆成真珠矣方平曰姑故年少吾老矣了不喜復作此狡獪變化也方平語經家人曰吾欲賜汝輩酒此酒乃出天廚其味醇醲非世人所宜飲飲之或能爛腸今當以水和之汝輩勿怪也乃以一升酒合水一斗攪之賜經家飲一升許良久酒盡方平語左右曰不足遠取也以千錢與餘杭姥相聞求其沽酒須更信還得一油囊酒五斗許信傳餘杭姥答言恐地上酒不中尊飲耳又麻姑鳥爪蔡經見之心中念言背大癢時得此爪以爬背當佳方平已知經心中所念即使人牽經鞭之謂曰麻姑神人也汝何思謂爪可以爬背耶但見鞭著經背亦不見有人持鞭者方平告經曰吾鞭不可妄得也是日又以一符傳授蔡經鄰人陳尉能檄召鬼魔救人治疾蔡經亦得解蛻之道如蛻蟬耳經常從王君遊山海或暫歸家王吾亦有書與陳尉多是篆文或真書字廓落而大陳尉世世寶之晏畢方平麻姑命駕升天而去蕭鼓從如初焉
